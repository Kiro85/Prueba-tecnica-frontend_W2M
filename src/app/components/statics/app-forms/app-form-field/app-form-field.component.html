<div class="c-form-field">
  <span class="c-form-field__label">{{ field()?.label }}*</span>
  @if (field()?.type === 'img') {
    <input type="file" class="c-form-field__files" (change)="onFileSelected(field()?.control!, $event)" />
  } @else {
    <mat-form-field class="c-form-field__input" appearance="fill">
      @if (field()?.type === 'text') {
        <input matInput [formControl]="field()?.control!" [placeholder]="field()?.placeholder!" />
      } @else if (field()?.type === 'textarea') {
        <textarea
          matInput
          [formControl]="field()?.control!"
          [placeholder]="field()?.placeholder!"
          rows="3"
        ></textarea>
      }
    </mat-form-field>
  }
  @if (field()?.control && field()?.control?.invalid && field()?.control?.touched) {
    <mat-error>{{ getErrorMessage(field()?.control!) }}</mat-error>
  }
</div>
