<footer class="s-footer">
  <span class="s-footer__copyright">© {{footer.currentYear}} {{footer.companyName}}</span>

  <ul class="s-footer__social-media">
    @for (icon of footer.iconList; track icon) {
      <li class="s-footer__social-media-icon">
        <a href="#">
          <img
            src="assets/social-media-icons/{{icon}}.svg"
            alt="{{icon}} icon"
          />
        </a>
      </li>
    }
  </ul>
</footer>
