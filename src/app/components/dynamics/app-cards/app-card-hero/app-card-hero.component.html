<article class="c-card-hero">
  <!-- Image -->
  <figure class="c-card-hero__img-container">
    <img class="c-card-hero__img" src="{{hero?.image}}" alt="Image of {{hero?.name}}">
  </figure>

  <!-- Info -->
  <div class="c-card-hero__content">
    <div class="c-card-hero__info">
      <h2 class="c-card-hero__name">{{firstCharToUpperCase(hero?.name)}}</h2>
      <p class="c-card-hero__superpower">{{hero?.superpower}}</p>
      <p class="c-card-hero__description">{{hero?.description}}</p>
      <p class="c-card-hero__city">{{hero?.city}}</p>
      <div class="c-card-hero__buttons">
        <app-button-edit (click)="OpenFormHeroeEdit()"></app-button-edit>
        <app-button-secondary [message]="'Eliminar'" (click)="OpenConfirmDeleteModal()"></app-button-secondary>
      </div>
    </div>
  </div>
</article>
