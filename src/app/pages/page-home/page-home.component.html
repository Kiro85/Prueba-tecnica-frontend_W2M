<main class="p-home">
  <section class="p-home__nav">
      <app-search-bar class="p-home__search-bar" (query)="query.set($event)"></app-search-bar>
      <app-button class="p-home__button-create" (pressed)="openCreateHeroForm()" icon="add" customClass="c-button--create">Crear nuevo héroe</app-button>
  </section>

  <section class="p-home__title">
    <h2>Héroes más allá de la imaginación</h2>
    <p>
      Desde tiempos inmemoriales, la humanidad ha soñado con figuras extraordinarias capaces de
      desafiar los límites de la realidad.
    </p>
  </section>

  <section-cards [query]="query()"></section-cards>
</main>
