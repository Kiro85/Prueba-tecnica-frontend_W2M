@if (loading()) {
  <app-spinner></app-spinner>
} @else if (error()) {
  <app-error-message
    message="Error al conectar con el servidor. Por favor, pruebe más tarde."
  ></app-error-message>
} @else {
  <section class="s-list-hero">
    <ul class="s-list-hero__cards">
      <!-- Heroes by name -->
      @if (heroesFiltered()) {
        @for (hero of heroesFiltered(); track hero.id) {
          <li class="s-list-hero__card">
            <app-card-hero [hero]="hero"></app-card-hero>
          </li>
        }

        <!-- All heroes -->
      } @else if (heroes()) {
        @for (hero of heroes(); track hero.id) {
          <li class="s-list-hero__card">
            <app-card-hero [hero]="hero"></app-card-hero>
          </li>
        }
      }
    </ul>
    <app-button-primary
      class="s-list-hero__button"
      [disabled]="!morePages()"
      [message]="'Ver más'"
      (click)="nextPage()"
    ></app-button-primary>
  </section>
}
